name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Run linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Create a go.work file
        run: cp go.work.example go.work
      - uses: dagger/dagger-for-github@v5
        with:
          verb: call
          args: -m build/ci lint --source-dir=. stdout 
  
  check-generation:
    name: Check generation has been run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Create a go.work file
        run: cp go.work.example go.work
      - uses: dagger/dagger-for-github@v5
        with:
          verb: call
          args: -m build/ci check-generation --source-dir=. stdout

  unit-tests:
    name: Run unit tests
    needs: ["lint", "check-generation"]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Create a go.work file
        run: cp go.work.example go.work
      - uses: dagger/dagger-for-github@v5
        with:
          verb: call
          args: -m build/ci unit-tests --source-dir=. stdout 

  integration-tests:
    name: Run integration tests
    needs: ["unit-tests"]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Create a go.work file
        run: cp go.work.example go.work
      - name: Create a credentials file
        run: |
          echo "BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}" > ./.credentials.yaml
          echo "BINANCE_SECRET_KEY=${{ secrets.BINANCE_SECRET_KEY }}" >> ./.credentials.yaml
      - uses: dagger/dagger-for-github@v5
        with:
          verb: call
          args: -m build/ci integration-tests --source-dir=. --secrets-file=file:./.credentials.env stdout 