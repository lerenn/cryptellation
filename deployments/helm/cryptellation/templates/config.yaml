apiVersion: v1
kind: ConfigMap
metadata:
    name: cryptellation-config
data:
    health.port: "{{ .Values.config.health.port | default 9000 }}"
    nats.host: "{{ .Values.config.nats.host }}"
    nats.port: "{{ .Values.config.nats.port }}"
    sqldb.host: "{{ .Values.config.sqldb.host }}"
    sqldb.port: "{{ .Values.config.sqldb.port }}"
    sqldb.database: "{{ .Values.config.sqldb.database }}"
