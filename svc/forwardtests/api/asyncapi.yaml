asyncapi: 3.0.0
info:
  title: Cryptellation ForwardTests Service
  version: 1.0.0
  description: >
    This service is providing simulations on live data.

channels:
  CreateRequest:
    address: cryptellation.backtests.create
    messages:
      CreateRequest:
        $ref: "#/components/messages/CreateRequest"
  CreateResponse:
    messages:
      CreateResponse:
        $ref: "#/components/messages/CreateResponse"

  ServiceInfoRequest:
    address: cryptellation.forwardtests.info
    messages:
      ServiceInfoRequest:
        $ref: "#/components/messages/ServiceInfoRequest"
  ServiceInfoResponse:
    messages:
      ServiceInfoResponse:
        $ref: "#/components/messages/ServiceInfoResponse"

operations:
  Create:
    action: receive
    channel: 
      $ref: "#/channels/CreateRequest"
    reply:
      address:
        location: "$message.header#/replyTo"
      channel:
        $ref: '#/channels/CreateResponse'

  ServiceInfo:
    action: receive
    channel: 
      $ref: "#/channels/ServiceInfoRequest"
    reply:
      address:
        location: "$message.header#/replyTo"
      channel:
        $ref: '#/channels/ServiceInfoResponse'


components:
  messageTraits:
    withReplyTo:
      headers:
        type: object
        required:
          - replyTo
        properties:
          replyTo:
            description: Channel used to respond to request
            type: string
    withCorrelationID:
      headers:
        type: object
        properties:
          correlationId:
            description: Correlation ID set by client
            type: string
      correlationId:
        description: Default Correlation ID
        location: $message.header#/correlationId

  messages:
    CreateRequest:
      payload:
        type: object
        required:
          - accounts
        properties:
          accounts:
            type: array
            items:
              $ref: '#/components/schemas/Account'
      traits:
        - $ref: "#/components/messageTraits/withReplyTo"
        - $ref: "#/components/messageTraits/withCorrelationID"
    CreateResponse:
      payload:
        type: object
        required:
          - id
        oneOf:
        - properties:
            id:
              type: string
              description: Newly created backtest ID
        - properties:
            error:
              $ref: '#/components/schemas/Error'
      traits:
        - $ref: "#/components/messageTraits/withCorrelationID"

    ServiceInfoRequest:
      payload:
        type: object
      traits:
        - $ref: "#/components/messageTraits/withReplyTo"
        - $ref: "#/components/messageTraits/withCorrelationID"
    ServiceInfoResponse:
      payload:
        type: object
        required:
        - apiVersion
        - binVersion
        properties:
          apiVersion:
            description: Version of the API
            type: string
            example: 1.0.0
          binVersion:
            description: Version of the binary
            type: string
            example: 1.0.0
      traits:
        - $ref: "#/components/messageTraits/withCorrelationID"

  schemas:
    Account:
      type: object
      required:
        - name
        - assets
      properties:
        name:
          type: string
          description: Account's name
        assets:
          type: array
          description: Account's assets
          items:
            $ref: '#/components/schemas/Asset'
    Asset:
      type: object
      description: An asset is a particular commodity with an amount
      required:
        - name
        - amount
      properties:
        name:
          type: string
        amount:
          type: number
          format: double
    Error:
      type: object
      description: Response to a failed call
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: Code to identify the error type, based on HTTP errors
        message:
          type: string
          description: Main error reason
          examples:
            - "Invalid request: no time specified"