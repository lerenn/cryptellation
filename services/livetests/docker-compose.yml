version: "3.5"

services:
    livetests-redis:
        image: redis:6-alpine
        networks:
            - network
    livetests:
        build:
            context: .
            dockerfile: build/package/Dockerfile
        ports:
            - 127.0.0.1:9006:9006
        env_file:
            - ../../.env
        environment:
            - REDIS_URL=livetests-redis:6379
            - SERVICE_PORT=9006
        depends_on:
            - livetests-redis
            # - ticks
        networks:
            - network
    livetests-testing:
        profiles:
            - testing
        depends_on:
            - livetests-redis
        build: ./tests
        image: cryptellation-livetests-testing
        env_file:
            - ../../.env
        environment:
            - REDIS_URL=backtests-redis:6379
        volumes:
            - gocache:/go/pkg/mod
            - gobuild:/root/.cache/go-build
            - .:/code
        networks:
            - network

volumes:
    gocache:
    gobuild:

networks:
    network:
